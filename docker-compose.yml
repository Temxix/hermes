version: '3.8'

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes-agent
    restart: unless-stopped
    stdin_open: true # tty support for interactive CLI
    tty: true
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      # Mount persistent memory and configuration
      - hermes-data:/root/.hermes
      - ./data:/opt/data
    ports:
      - "8642:8642"

volumes:
  hermes-data:
