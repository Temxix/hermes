version: '3.8'

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes-agent
    restart: unless-stopped
    stdin_open: true # tty support for interactive CLI
    tty: true
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      # Mount persistent memory and configuration
      - hermes-data:/root/.hermes
      - ./data:/opt/data
    ports:
      - "8642:8642"
    # Default entrypoint/command
    # To run setup wizard interactively: docker compose run --rm hermes setup
    # To run CLI: docker compose run --rm hermes
    # To run gateway 24/7 background: docker compose up -d

volumes:
  hermes-data:
